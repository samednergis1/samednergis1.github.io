<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch App - Mobile Simulator</title>
  <style>
    :root {
      --bg-main: #18181b;
      --bg-panel: #27272a;
      --metal-border: rgba(148, 163, 184, 0.28);
      --accent: #06b6d4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e1e2f 0%, var(--bg-main) 55%, #111827 100%);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #e5e7eb;
      padding: 24px;
    }

    .container {
      width: min(980px, 100%);
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .meta {
      width: 100%;
      background: linear-gradient(145deg, #2a2a2e, #242428);
      border: 1px solid var(--metal-border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .meta a {
      color: #67e8f9;
      text-decoration: none;
      font-weight: 600;
    }

    .phone {
      width: min(390px, 100%);
      height: 790px;
      background: #0b1020;
      border: 2px solid #475569;
      border-radius: 38px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55), inset 0 0 0 4px #111827;
      padding: 14px 10px;
      position: relative;
    }

    .notch {
      width: 148px;
      height: 26px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid #1f2937;
      margin: 0 auto 10px;
    }

    iframe {
      width: 100%;
      height: calc(100% - 36px);
      border: 0;
      border-radius: 28px;
      background: #000;
    }

    @media (max-width: 440px) {
      body {
        padding: 12px;
      }

      .phone {
        height: 88vh;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="meta">
      <strong>Mobile Simulation View</strong>
      <a href="./index.html">Open Full Web Version</a>
    </div>

    <div class="phone">
      <div class="notch"></div>
      <iframe src="./index.html" title="Phone Simulation"></iframe>
    </div>
  </div>
</body>
</html>
